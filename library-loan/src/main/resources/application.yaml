server:
  port: 8080

spring:
  application:
    name: library-loan
  datasource:
    url: jdbc:postgresql://localhost:5432/library_loan
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  security:
    basic-auth-enabled: true

loan:
  properties:
    dueDays: 14
    loans: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.springdoc: DEBUG
    org.springframework.web: DEBUG
    com.fasterxml.jackson: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  show-actuator: true